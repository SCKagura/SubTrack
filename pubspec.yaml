name: subtrack
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend — Supabase (replaces Firebase + Hive)
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.1

  # UI & Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  fl_chart: ^0.66.0
  table_calendar: ^3.1.3
  share_plus: ^10.1.4
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
